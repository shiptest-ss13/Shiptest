author: Bumtickley00
changes:
  - {rscadd: 'You can now load regular revolvers with an ammo stack, not just a single
      shell.'}
  - {bugfix: Reloading gate-loaded revolvers with an ammo stack now spins the 
      cylinder until all the empty slots are full instead of only trying a 
      couple times.}
  - {bugfix: Moving while unloading a gate-loaded revolver will no longer 
      instantly dump the rounds on the floor.}
  - {bugfix: Loading a speedloader and a revolver at the same time will no 
      longer quantum-entangle bullets between them.}
  - {code_imp: Removed some copypaste in the revolver code.}
delete-after: true
